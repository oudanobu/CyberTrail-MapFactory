name: Compile Raster PNG Map Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_target:
        description: 'Compile Target (build=all, build=country, build=province, build=admin3, or build=<single_key>)'
        required: true
        default: 'build=admin3'
        type: choice
        options:
          - build=all
          - build=country
          - build=province
          - build=admin3
          - build=world
          - build=china
          - build=japan
          - build=liaoning
          - build=zhenxing_hd
          - build=yuanbao_hd
          - build=zhenan_hd
          - build=donggang_hd
          - build=fengcheng_hd
          - build=kuandian_hd

permissions:
  contents: write

jobs:
  build-maps:
    name: Build Resilient Raster PNG Map Targets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y wget sqlite3
          pip3 install Pillow --break-system-packages

      - name: Create Map Working Directories
        run: |
          mkdir -p data/tile_cache dist maps
          chmod +x maps/*.sh || true

      - name: Establish Target Selection
        id: target-selector
        run: |
          TARGET="${{ github.event.inputs.build_target }}"
          if [ -z "$TARGET" ]; then
            TARGET="build=admin3"
          fi
          echo "selected_target=$TARGET" >> "$GITHUB_OUTPUT"

      - name: Cache Tile Assets
        uses: actions/cache@v4
        with:
          path: data/tile_cache
          key: map-tiles-cache-${{ hashFiles('maps/*.json') }}
          restore-keys: |
            map-tiles-cache-

      - name: Execute Resilient Tile Compilation Pipeline
        run: |
          TARGET="${{ steps.target-selector.outputs.selected_target }}"
          bash maps/build_all_raster_maps.sh "$TARGET"

      - name: Verify Final MBTiles Integrity & Metadata
        run: |
          ls -lh dist/
          for f in dist/*.mbtiles; do
            if [ -f "$f" ]; then
              echo "Verifying database integrity for $f"
              sqlite3 "$f" "SELECT zoom_level, COUNT(*) FROM tiles GROUP BY zoom_level;"
            fi
          done

      - name: Generate Release Tag
        id: release-tag
        run: |
          TAG_NAME="maps-raster-$(date +'%Y%m%d-%H%M')"
          echo "tag=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release-tag.outputs.tag }}
          name: "CyberTrail Maps Release ${{ steps.release-tag.outputs.tag }}"
          body: |
            ### 🗺️ CyberTrail MapFactory Offline Map Compilation Run
            - **Target Category/Key**: `${{ steps.target-selector.outputs.selected_target }}`
            - **Build Status**: Success ✅
            - **Generated Packages**: Built and optimized ready-for-mobile offline MBTiles raster layers.
          draft: false
          prerelease: false
          files: dist/*.mbtiles
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
