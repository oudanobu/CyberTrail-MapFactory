name: Compile Raster PNG Map Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      map_target:
        description: 'Compile Target (world, china, dandong_overview, dandong_detail, or all)'
        required: true
        default: 'all'
        type: choice
        options:
          - world
          - china
          - dandong_overview
          - dandong_detail
          - all

permissions:
  contents: write

jobs:
  build-maps:
    name: Build Resilient Raster PNG Map Targets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y wget sqlite3
          pip3 install Pillow --break-system-packages

      - name: Create Map Working Directories
        run: |
          mkdir -p data/tile_cache dist maps
          chmod +x maps/*.sh || true

      - name: Establish Target Selection
        id: target-selector
        run: |
          TARGET="${{ github.event.inputs.map_target }}"
          if [ -z "$TARGET" ]; then
            TARGET="all"
          fi
          echo "selected_target=$TARGET" >> "$GITHUB_OUTPUT"
          echo "Selected Compilation Target: $TARGET"

      - name: Cache Tile Assets
        uses: actions/cache@v4
        with:
          path: data/tile_cache
          key: map-tiles-cache-${{ hashFiles('maps/bounding_boxes.json') }}
          restore-keys: |
            map-tiles-cache-

      - name: Execute Resilient Tile Compilation Pipeline
        run: |
          echo "===> Commencing Direct Web Map Tile Fetching & Quantization <==="
          TARGET="${{ steps.target-selector.outputs.selected_target }}"
          bash maps/build_all_raster_maps.sh "$TARGET"

      - name: Verify Final MBTiles Integrity & Metadata
        run: |
          echo "=== Built Raster PNG Map Archives ==="
          ls -lh dist/
          for f in dist/*.mbtiles; do
            if [ -f "$f" ]; then
              echo "Database: $f"
              sqlite3 "$f" "SELECT name, value FROM metadata WHERE name IN ('format', 'type', 'bounds', 'minzoom', 'maxzoom', 'tile_source');"
              sqlite3 "$f" "SELECT zoom_level, COUNT(*) FROM tiles GROUP BY zoom_level;"
            fi
          done

      - name: Create GitHub Release and Upload Assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TAG="maps-raster-$(date +'%Y%m%d-%H%M')"
          echo "Creating repository release: $RELEASE_TAG"
          
          if [ -n "$(ls -A dist/*.mbtiles 2>/dev/null)" ]; then
            gh release create "$RELEASE_TAG" dist/*.mbtiles \
              --title "CyberTrail Raster Maps $RELEASE_TAG" \
              --notes "Production-ready Resilient Offline Raster PNG MBTiles. Color optimized to space-efficient PNG8 format. Includes World (0-5), China (6-8), Dandong Overview (9-11), and Dandong Detailed (12-16)."
          else
            echo "No compiled mbtiles artifacts found! Release creation cancelled."
            exit 1
          fi
