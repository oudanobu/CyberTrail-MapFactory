name: Compile Raster PNG Map Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      map_target:
        description: 'Compile Target (world, china_overview, liaoning, dandong, or all)'
        required: true
        default: 'dandong'
        type: choice
        options:
          - world
          - china_overview
          - liaoning
          - dandong
          - all

permissions:
  contents: write

jobs:
  build-maps:
    name: Build Raster PNG Map Targets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install GIS System Dependencies and Osmium Tool
        run: |
          sudo apt-get update && sudo apt-get install -y osmium-tool wget aria2 jq sqlite3 python3-pip
          pip3 install Pillow --break-system-packages

      - name: Create Map Working Directories
        run: |
          mkdir -p data/sources dist maps
          chmod +x maps/*.sh || true

      - name: Establish Target Selection
        id: target-selector
        run: |
          TARGET="${{ github.event.inputs.map_target }}"
          if [ -z "$TARGET" ]; then
            TARGET="all"
          fi
          echo "selected_target=$TARGET" >> "$GITHUB_OUTPUT"
          echo "Selected Compilation Target: $TARGET"

      - name: Fetch and Compile Vector Source Map
        run: |
          echo "===> Creating data directory..."
          mkdir -p data
          
          TARGET="${{ steps.target-selector.outputs.selected_target }}"
          echo "Selected Target: $TARGET"
          
          # 1. Determine input OSM PBF file and download it
          PBF_FILE=""
          if [ "$TARGET" = "china_overview" ] || [ "$TARGET" = "all" ]; then
            PBF_FILE="china-latest.osm.pbf"
            echo "[*] Downloading China Geofabrik Dataset (~1.3 GB)..."
            wget -q --show-progress -O "data/$PBF_FILE" https://download.geofabrik.de/asia/china-latest.osm.pbf
          elif [ "$TARGET" = "liaoning" ]; then
            PBF_FILE="liaoning-latest.osm.pbf"
            echo "[*] Downloading Liaoning Geofabrik Dataset (~400 MB)..."
            wget -q --show-progress -O "data/$PBF_FILE" https://download.geofabrik.de/asia/china/liaoning-latest.osm.pbf
          elif [ "$TARGET" = "dandong" ]; then
            if [ ! -f "data/liaoning-latest.osm.pbf" ]; then
              echo "[*] Downloading Liaoning Geofabrik Dataset to slice Dandong..."
              wget -q --show-progress -O data/liaoning-latest.osm.pbf https://download.geofabrik.de/asia/china/liaoning-latest.osm.pbf
            fi
            echo "[*] Slicing Dandong region from Liaoning dataset..."
            BBOX="123.38,39.73,125.70,41.20"
            osmium extract --bbox "$BBOX" data/liaoning-latest.osm.pbf -o "data/dandong.osm.pbf" --strategy=complete_ways --overwrite
            PBF_FILE="dandong.osm.pbf"
          else
            # Default fallback
            PBF_FILE="liaoning-latest.osm.pbf"
            echo "[*] Downloading Liaoning Geofabrik Dataset as default..."
            wget -q --show-progress -O "data/$PBF_FILE" https://download.geofabrik.de/asia/china/liaoning-latest.osm.pbf
          fi
          
          # Verify the downloaded/sliced PBF exists and is not empty
          PBF_SIZE=$(wc -c < "data/$PBF_FILE")
          echo "  - Input OSM PBF size: $PBF_SIZE bytes"
          if [ "$PBF_SIZE" -lt 100000 ]; then
            echo "[-] Error: OSM PBF file is too small! Slicing or download failed."
            exit 1
          fi
          
          # 2. Download Planetiler tool
          echo "===> Downloading Planetiler..."
          wget -q -O planetiler.jar https://github.com/onthegomap/planetiler/releases/latest/download/planetiler.jar
          
          # 3. Compile Vector MBTiles on-the-fly using Planetiler
          echo "===> Compiling vector MBTiles using Planetiler..."
          java -Xmx4g -jar planetiler.jar --osm="data/$PBF_FILE" --mbtiles="data/source_vector.mbtiles" --force
          
          FILE="data/source_vector.mbtiles"
          
          # 4. Verify vector compilation
          if [ ! -f "data/source_vector.mbtiles" ]; then
            echo "[-] Critical Error: source_vector.mbtiles was not generated by Planetiler!"
            exit 1
          fi
          echo "[+] Vector source map compiled successfully!"

      - name: Start TileServer-GL Container
        run: |
          echo "===> Starting TileServer-GL..."
          docker run -d --name tileserver -p 8080:8080 -v $(pwd)/data:/data maptiler/tileserver-gl:latest --mbtiles /data/source_vector.mbtiles
          
          echo "===> Polling health-check on localhost:8080..."
          HEALTHY=false
          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 2 http://localhost:8080/styles/basic/0/0/0.png || echo "offline")
            if [ "$STATUS" = "200" ]; then
              echo "[+] TileServer-GL is online and successfully serving basic styles!"
              HEALTHY=true
              break
            fi
            echo "Waiting for TileServer-GL to boot... (Attempt $i/30, Status: $STATUS)"
            sleep 3
          done
          
          if [ "$HEALTHY" = "false" ]; then
            echo "[-] Error: TileServer-GL failed to start or serve styles within the timeout limit."
            echo "=== Container logs ==="
            docker logs tileserver || true
            exit 1
          fi

      - name: Execute Unified Map Compilation and Optimization Pipeline
        run: |
          bash maps/build_all_raster_maps.sh "${{ steps.target-selector.outputs.selected_target }}"

      - name: Stop TileServer-GL Container
        if: always()
        run: |
          echo "===> Stopping and cleaning up TileServer-GL container..."
          docker stop tileserver || true
          docker rm tileserver || true

      - name: Check Final Raster Map Archives
        run: |
          echo "=== Built Raster PNG Map Archives ==="
          ls -lh dist/
          for f in dist/*.mbtiles; do
            if [ -f "$f" ]; then
              echo "Database: $f"
              sqlite3 "$f" "SELECT name, value FROM metadata WHERE name IN ('format', 'type');"
            fi
          done

      - name: Create GitHub Release and Upload Assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TAG="maps-raster-$(date +'%Y%m%d-%H%M')"
          echo "Creating repository release: $RELEASE_TAG"
          
          if [ -n "$(ls -A dist/*.mbtiles 2>/dev/null)" ]; then
            gh release create "$RELEASE_TAG" dist/*.mbtiles \
              --title "CyberTrail Raster Maps $RELEASE_TAG" \
              --notes "Production-ready Offline Raster PNG MBTiles. Format set to png. Zoom levels: World (0-5), China (6-8), Liaoning (9-11), Dandong (12-16/17)."
          else
            echo "No compiled mbtiles artifacts found! Release creation cancelled."
            exit 1
          fi
