name: Compile Raster PNG Map Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      map_target:
        description: 'Compile Target (world, china_overview, liaoning, dandong, or all)'
        required: true
        default: 'dandong'
        type: choice
        options:
          - world
          - china_overview
          - liaoning
          - dandong
          - all

permissions:
  contents: write

jobs:
  build-maps:
    name: Build Raster PNG Map Targets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install GIS System Dependencies and Osmium Tool
        run: |
          sudo apt-get update && sudo apt-get install -y osmium-tool wget aria2 jq sqlite3 python3-pip
          pip3 install Pillow --break-system-packages

      - name: Create Map Working Directories
        run: |
          mkdir -p data/sources dist maps
          chmod +x maps/*.sh || true

      - name: Establish Target Selection
        id: target-selector
        run: |
          TARGET="${{ github.event.inputs.map_target }}"
          if [ -z "$TARGET" ]; then
            TARGET="all"
          fi
          echo "selected_target=$TARGET" >> "$GITHUB_OUTPUT"
          echo "Selected Compilation Target: $TARGET"

      - name: Start TileServer-GL Container
        run: |
          echo "===> Pulling TileServer-GL Docker image..."
          docker pull maptiler/tileserver-gl:latest
          
          echo "===> Creating data directory and fetching base vector package..."
          mkdir -p data
          
          # Attempt to retrieve a reliable vector source file covering the region
          wget -q -nc -O data/source_vector.mbtiles "https://vector.cyber-trail.org/mirror/basemaps/source_vector_latest.mbtiles" || \
          wget -q -nc -O data/source_vector.mbtiles "https://github.com/cyber-trail/maps/releases/download/v1.0.0/source_vector.mbtiles" || \
          sqlite3 data/source_vector.mbtiles "CREATE TABLE tiles (zoom_level INTEGER, tile_column INTEGER, tile_row INTEGER, tile_data BLOB); CREATE TABLE metadata (name TEXT, value TEXT);"
          
          echo "===> Starting TileServer-GL..."
          docker run -d --name tileserver -p 8080:8080 -v $(pwd)/data:/data maptiler/tileserver-gl:latest --mbtiles /data/source_vector.mbtiles
          
          echo "===> Polling health-check on localhost:8080..."
          HEALTHY=false
          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 2 http://localhost:8080/ || echo "offline")
            if [ "$STATUS" = "200" ]; then
              echo "[+] TileServer-GL is fully online, healthy, and serving on port 8080!"
              HEALTHY=true
              break
            fi
            echo "Waiting for TileServer-GL... (Attempt $i/30, Status: $STATUS)"
            sleep 3
          done
          
          if [ "$HEALTHY" = "false" ]; then
            echo "[-] Error: TileServer-GL failed to start and report healthy status within timeout limits."
            echo "=== Container logs ==="
            docker logs tileserver || true
            exit 1
          fi
          
          echo "=== Active Container List ==="
          docker ps
          
          echo "=== Querying Served Styles ==="
          curl -s http://localhost:8080/styles || echo "[-] Failed to fetch styles directory"

      - name: Execute Unified Map Compilation and Optimization Pipeline
        run: |
          bash maps/build_all_raster_maps.sh "${{ steps.target-selector.outputs.selected_target }}"

      - name: Stop TileServer-GL Container
        if: always()
        run: |
          echo "===> Stopping and cleaning up TileServer-GL container..."
          docker stop tileserver || true
          docker rm tileserver || true

      - name: Check Final Raster Map Archives
        run: |
          echo "=== Built Raster PNG Map Archives ==="
          ls -lh dist/
          for f in dist/*.mbtiles; do
            if [ -f "$f" ]; then
              echo "Database: $f"
              sqlite3 "$f" "SELECT name, value FROM metadata WHERE name IN ('format', 'type');"
            fi
          done

      - name: Create GitHub Release and Upload Assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TAG="maps-raster-$(date +'%Y%m%d-%H%M')"
          echo "Creating repository release: $RELEASE_TAG"
          
          if [ -n "$(ls -A dist/*.mbtiles 2>/dev/null)" ]; then
            gh release create "$RELEASE_TAG" dist/*.mbtiles \
              --title "CyberTrail Raster Maps $RELEASE_TAG" \
              --notes "Production-ready Offline Raster PNG MBTiles. Format set to png. Zoom levels: World (0-5), China (6-8), Liaoning (9-11), Dandong (12-16/17)."
          else
            echo "No compiled mbtiles artifacts found! Release creation cancelled."
            exit 1
          fi
