name: Compile Map Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      map_target:
        description: 'Compile Target (china_overview, liaoning_overview, dandong_detail, zhenxing_detail, yuanbao_detail, zhenan_detail, or all)'
        required: true
        default: 'dandong_detail'
        type: choice
        options:
          - china_overview
          - liaoning_overview
          - dandong_detail
          - zhenxing_detail
          - yuanbao_detail
          - zhenan_detail
          - all

permissions:
  contents: write

jobs:
  build-maps:
    name: Build Map Targets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install GIS Crops and Osmium Tool
        run: |
          sudo apt-get update && sudo apt-get install -y osmium-tool wget aria2 jq

      - name: Download Planetiler
        run: |
          mkdir -p bin
          wget -q https://github.com/onthegomap/planetiler/releases/latest/download/planetiler.jar -O bin/planetiler.jar
          chmod +x bin/planetiler.jar

      - name: Prepare Workspace and Output Directories
        run: |
          mkdir -p data/sources dist maps/admin_boundaries
          chmod +x maps/crop_*.sh || true

      - name: Download Planetiler Auxiliary Data
        run: |
          echo "===> Downloading auxiliary data (Natural Earth, water polygons, etc.)"
          java -jar bin/planetiler.jar --download

      - name: Establish Target Selection
        id: target-selector
        run: |
          TARGET="${{ github.event.inputs.map_target }}"
          if [ -z "$TARGET" ]; then
            TARGET="dandong_detail"
          fi
          echo "selected_target=$TARGET" >> "$GITHUB_OUTPUT"
          echo "Selected Compilation Target: $TARGET"

      - name: Compile - China Overview MBTiles
        if: steps.target-selector.outputs.selected_target == 'china_overview' || steps.target-selector.outputs.selected_target == 'all'
        run: |
          echo "===> Compiling China Overview MBTiles (Max Zoom: 6)..."
          sh maps/crop_china.sh
          java -Xmx6g -jar bin/planetiler.jar --osm-path=data/china-latest.osm.pbf --output=dist/china_overview.mbtiles --maxzoom=6 --force

      - name: Compile - Liaoning Overview MBTiles
        if: steps.target-selector.outputs.selected_target == 'liaoning_overview' || steps.target-selector.outputs.selected_target == 'all'
        run: |
          echo "===> Compiling Liaoning Overview MBTiles (Max Zoom: 8)..."
          sh maps/crop_liaoning.sh
          java -Xmx6g -jar bin/planetiler.jar --osm-path=data/liaoning.osm.pbf --output=dist/liaoning_overview.mbtiles --maxzoom=8 --force

      - name: Compile - Dandong Detail MBTiles
        if: steps.target-selector.outputs.selected_target == 'dandong_detail' || steps.target-selector.outputs.selected_target == 'all'
        run: |
          echo "===> Compiling Dandong Detail MBTiles..."
          sh maps/crop_dandong.sh
          java -Xmx4g -jar bin/planetiler.jar --osm-path=data/dandong.osm.pbf --output=dist/dandong_detail.mbtiles --maxzoom=14 --force

      - name: Compile - Zhenxing Detail MBTiles
        if: steps.target-selector.outputs.selected_target == 'zhenxing_detail' || steps.target-selector.outputs.selected_target == 'all'
        run: |
          echo "===> Compiling Zhenxing Detail MBTiles..."
          sh maps/crop_zhenxing.sh
          java -Xmx4g -jar bin/planetiler.jar --osm-path=data/zhenxing.osm.pbf --output=dist/zhenxing_detail.mbtiles --maxzoom=16 --force

      - name: Compile - Yuanbao Detail MBTiles
        if: steps.target-selector.outputs.selected_target == 'yuanbao_detail' || steps.target-selector.outputs.selected_target == 'all'
        run: |
          echo "===> Compiling Yuanbao Detail MBTiles..."
          sh maps/crop_yuanbao.sh
          java -Xmx4g -jar bin/planetiler.jar --osm-path=data/yuanbao.osm.pbf --output=dist/yuanbao_detail.mbtiles --maxzoom=16 --force

      - name: Compile - Zhenan Detail MBTiles
        if: steps.target-selector.outputs.selected_target == 'zhenan_detail' || steps.target-selector.outputs.selected_target == 'all'
        run: |
          echo "===> Compiling Zhenan Detail MBTiles..."
          sh maps/crop_zhenan.sh
          java -Xmx4g -jar bin/planetiler.jar --osm-path=data/zhenan.osm.pbf --output=dist/zhenan_detail.mbtiles --maxzoom=16 --force

      - name: Check Built Visual Files
        run: |
          echo "=== Built Map Archives ==="
          ls -lh dist/

      - name: Create GitHub Release and Upload Assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TAG="maps-$(date +'%Y%m%d-%H%M')"
          echo "Creating repository release: $RELEASE_TAG"
          
          if [ -n "$(ls -A dist/*.mbtiles 2>/dev/null)" ]; then
            gh release create "$RELEASE_TAG" dist/*.mbtiles \
              --title "$RELEASE_TAG" \
              --notes "Automated Map Production Release. Target select: ${{ steps.target-selector.outputs.selected_target }}."
          else
            echo "No compiled mbtiles artifacts found! Release creation cancelled."
            exit 1
          fi
